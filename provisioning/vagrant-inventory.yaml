all:
  children:
    elastic_stack:
      vars:
        ansible_user: vagrant
        ansible_ssh_common_args: "-o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -o PasswordAuthentication=no -o IdentitiesOnly=yes -o LogLevel=FATAL -o PubkeyAcceptedKeyTypes=+ssh-rsa -o HostKeyAlgorithms=+ssh-rsa"
      children:
        elasticsearch:
          hosts:
            es-node-1:
              ansible_host: 127.0.0.1
              ansible_port: 2222
              ansible_ssh_private_key_file: "/Users/essan/Code/elasticsearch-training/provisioning/.vagrant/machines/es-node-1/virtualbox/private_key"
            es-node-2:
              ansible_host: 127.0.0.1
              ansible_port: 2200
