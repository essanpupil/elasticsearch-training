---
- name: Purge elasticsearch in join node to reset configs
  hosts: es-join
  gather_facts: true
  become: true
  tasks:
    - name: Purge a specific package and its configuration files
      ansible.builtin.apt:
        name: elasticsearch  # Replace with your package name
        state: absent
        purge: true
    - name: Remove Elasticsearch data directory and transport certificate
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/elasticsearch
        - /etc/elasticsearch/certs/transport.p12
