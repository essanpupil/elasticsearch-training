---
- name: install elasticsearch logstash and kibana
  hosts: kibana
  gather_facts: true
  become: true
  tasks:
    - name: Install Kibana
      ansible.builtin.yum:
        name: kibana
        state: present

    - name: Deploy Kibana configuration
      ansible.builtin.template:
        src: kibana.yml.j2
        dest: /etc/kibana/kibana.yml
        owner: root
        group: kibana
        mode: '0660'

    - name: Start and enable Kibana service
      ansible.builtin.systemd_service:
        name: kibana
        state: restarted
        enabled: yes
