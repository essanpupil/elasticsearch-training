---
- name: install elasticsearch logstash and kibana
  hosts: elasticsearch
  gather_facts: true
  become: true
  tasks:
    - name: Install Elasticsearch
      ansible.builtin.dnf:
        name: "elasticsearch"
        state: present
        enablerepo: elasticsearch

    - name: Deploy Elasticsearch configuration
      register: config_file
      ansible.builtin.template:
        src: elasticsearch-config-file.yml
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Enable and start Elasticsearch service
      when: config_file is changed
      ansible.builtin.systemd_service:
        name: elasticsearch
        state: restarted
        enabled: yes

    - name: Reset elastic password
      ansible.builtin.command:
        cmd: "{{ es_bin_dir }}/elasticsearch-reset-password -u elastic -b -i"
        stdin: "{{ elastic_password }}\n{{ elastic_password }}"
      register: cli_output_elastic
      changed_when: true

    - name: Show CLI execution results
      ansible.builtin.debug:
        var: cli_output_elastic.stdout_lines

    - name: Reset kibana_system password
      ansible.builtin.command:
        cmd: "{{ es_bin_dir }}/elasticsearch-reset-password -u kibana_system -b -i"
        stdin: "{{ kibana_system_password }}\n{{ kibana_system_password }}"
      register: cli_output
      changed_when: true

    - name: Show CLI execution results
      ansible.builtin.debug:
        var: cli_output.stdout_lines

