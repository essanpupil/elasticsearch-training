---
- name: install elasticsearch initial node
  hosts: es-initial
  gather_facts: true
  become: true
  tasks:
    - name: Install Elasticsearch
      ansible.builtin.apt:
        name: "elasticsearch"
        state: present

    - name: Deploy Elasticsearch configuration
      ansible.builtin.template:
        src: initial-elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Ensure Elasticsearch service is enabled and started
      ansible.builtin.systemd:
        name: elasticsearch
        state: started
        enabled: true

    - name: Wait for 5 seconds for nodes to completely settle down
      ansible.builtin.pause:
        seconds: 5

    - name: Generate a fresh node enrollment token
      ansible.builtin.command: |
        /usr/share/elasticsearch/bin/elasticsearch-create-enrollment-token -s node --url https://{{ ansible_host }}:9200
      register: token_output
      changed_when: false

- name: Install elasticsearch join node
  hosts: es-join
  gather_facts: true
  become: true
  tasks:
    - name: Install Elasticsearch
      ansible.builtin.apt:
        name: "elasticsearch"
        state: present

      # The task below will have to handle the following input prompt
      # This node will be reconfigured to join an existing cluster, using the enrollment token that you provided.
      # This operation will overwrite the existing configuration. Specifically: 
      #   - Security auto configuration will be removed from elasticsearch.yml
      #   - The [certs] config directory will be removed
      #   - Security auto configuration related secure settings will be removed from the elasticsearch.keystore
      # Do you want to continue with the reconfiguration process [y/N]y
    # Using expect module works in vagranbot debian 13 but does not works in aws ami-0e68dc81dc36750a1 (debian 13)
    # - name: Run Elasticsearch reconfigure utility using enrollment token
    #   ansible.builtin.expect:
    #     command: /usr/share/elasticsearch/bin/elasticsearch-reconfigure-node --enrollment-token {{ hostvars['node1']['token_output']['stdout'] | trim }}
    #     responses:
    #       '(?i)Do you want to continue with the reconfiguration process.*': 'y'
    #   # args:
    #   #   creates: /etc/elasticsearch/certs/transport.p12
    #   register: join_output

    - name: Run Elasticsearch reconfigure utility using enrollment token
      ansible.builtin.shell: |
        echo "y" | /usr/share/elasticsearch/bin/elasticsearch-reconfigure-node --enrollment-token {{ hostvars['node1']['token_output']['stdout'] | trim }}
      register: join_output
      # args:
      #   creates: /etc/elasticsearch/certs/transport.p12

    - name: debug join 
      debug:
        msg: "{{ join_output }}"

    - name: Deploy Elasticsearch configuration
      ansible.builtin.template:
        src: es-join-elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Ensure Elasticsearch service is enabled and started
      ansible.builtin.systemd:
        name: elasticsearch
        state: started
        enabled: true

    - name: Wait for 10 seconds for nodes to completely settle down
      ansible.builtin.pause:
        seconds: 5

- name: Confirm elasticsearch cluster
  hosts: es-initial
  gather_facts: true
  become: true
  tasks:
    - name: Reset elastic user password
      ansible.builtin.expect:
        command: "/usr/share/elasticsearch/bin/elasticsearch-reset-password --url https://{{ ansible_host }}:9200 -b -u elastic -i"
        responses:
          (?i)Enter password for \[elastic\]: "{{ elasticsearch_elastic_password }}"
          (?i)Re-enter password for \[elastic\]: "{{ elasticsearch_elastic_password }}"
      register: token_output
      changed_when: false

    - name: Query Elasticsearch API for active nodes
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_cat/nodes?h=ip,name,role&format=json"
        method: GET
        user: elastic
        password: "{{ elasticsearch_elastic_password }}"
        force_basic_auth: true
        validate_certs: false
      register: cluster_status

    - name: Print the Cluster Status and Active Node List
      ansible.builtin.debug:
        msg: "{{ cluster_status.json }}"
