---
- name: Reconfigure join node and restart after manual join
  hosts: es-join
  gather_facts: true
  become: true
  tasks:
    - name: Install Elasticsearch
      ansible.builtin.apt:
        name: "elasticsearch"
        state: present

    - name: Deploy Elasticsearch configuration
      ansible.builtin.template:
        src: es-join-elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Ensure Elasticsearch service is enabled and started
      ansible.builtin.systemd:
        name: elasticsearch
        state: started
        enabled: true

    - name: Wait for 10 seconds for nodes to completely settle down
      ansible.builtin.pause:
        seconds: 5

- name: Confirm elasticsearch cluster
  hosts: es-initial
  gather_facts: true
  become: true
  tasks:
    - name: Reset elastic user password
      ansible.builtin.expect:
        command: "/usr/share/elasticsearch/bin/elasticsearch-reset-password --url https://{{ ansible_host }}:9200 -b -u elastic -i"
        responses:
          (?i)Enter password for \[elastic\]: "{{ elasticsearch_elastic_password }}"
          (?i)Re-enter password for \[elastic\]: "{{ elasticsearch_elastic_password }}"
      register: token_output
      changed_when: false

    - name: Query Elasticsearch API for active nodes
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:9200/_cat/nodes?h=ip,name,role&format=json"
        method: GET
        user: elastic
        password: "{{ elasticsearch_elastic_password }}"
        force_basic_auth: true
        validate_certs: false
      register: cluster_status

    - name: Print the Cluster Status and Active Node List
      ansible.builtin.debug:
        msg: "{{ cluster_status.json }}"
