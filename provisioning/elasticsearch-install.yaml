---
- name: install elasticsearch logstash and kibana
  hosts: elasticsearch
  gather_facts: true
  become: true
  tasks:
    - name: Install Elasticsearch
      ansible.builtin.dnf:
        name: "elasticsearch"
        state: present
        enablerepo: elasticsearch

    - name: Deploy Elasticsearch configuration
      register: config_file
      ansible.builtin.template:
        src: elasticsearch.yml.j2
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Enable and start Elasticsearch service
      when: config_file is changed
      ansible.builtin.systemd_service:
        name: elasticsearch
        state: restarted
        enabled: yes

    - name: Reset elastic password
      when: inventory_hostname == 'node1'
      ansible.builtin.command:
        cmd: "{{ es_bin_dir }}/elasticsearch-reset-password -u elastic -b -i"
        stdin: "{{ elastic_password }}\n{{ elastic_password }}"
      register: cli_output_elastic
      changed_when: true

    - name: Show CLI execution results
      when: inventory_hostname == 'node1'
      ansible.builtin.debug:
        var: cli_output_elastic.stdout_lines

    - name: Reset kibana_system password
      when: inventory_hostname == 'node1'
      ansible.builtin.command:
        cmd: "{{ es_bin_dir }}/elasticsearch-reset-password -u kibana_system -b -i"
        stdin: "{{ kibana_system_password }}\n{{ kibana_system_password }}"
      register: cli_output
      changed_when: true

    - name: Show CLI execution results
      when: inventory_hostname == 'node1'
      ansible.builtin.debug:
        var: cli_output.stdout_lines

    - name: Generate Certificate Authority
      when: inventory_hostname == 'node1'
      ansible.builtin.command:
        cmd: "{{ es_bin_dir }}/elasticsearch-certutil ca --pass '' --silent"
      changed_when: true

    - name: Generate TLS Certificate
      when: inventory_hostname == 'node1'
      ansible.builtin.command:
        cmd: "{{ es_bin_dir }}/elasticsearch-certutil cert --ca elastic-stack-ca.p12 --pass '' --silent"
      changed_when: true

    - name: Fetch CA certificate
      when: inventory_hostname == 'node1'
      fetch:
        src: "/usr/share/elasticsearch/elastic-stack-ca.p12"
        dest: /tmp/elastic-stack-ca.p12
        flat: true

    - name: Fetch node certificate
      when: inventory_hostname == 'node1'
      fetch:
        src: "/usr/share/elasticsearch/elastic-certificates.p12"
        dest: /tmp/elastic-certificates.p12
        flat: true

    - name: Copy CA certificate to all elasticsearch nodes
      ansible.builtin.copy:
        src: /tmp/elastic-stack-ca.p12
        dest: /etc/elasticsearch/certs/elastic-stack-ca.p12
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Copy node certificate to all elasticsearch nodes
      ansible.builtin.copy:
        src: /tmp/elastic-certificates.p12
        dest: /etc/elasticsearch/certs/elastic-certificates.p12
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Generate Instance YAML file for certutil
      when: inventory_hostname == 'node1'
      copy:
        dest: /tmp/instances.yml
        content: |
          instances:
            - name: "node1"
              dns: [ "ip-10-0-3-88.us-east-2.compute.internal" ]
              ip: [ "10.0.3.27" ]
            - name: "node2"
              dns: [ "ip-10-0-3-214.us-east-2.compute.internal" ]
              ip: [ "10.0.3.214" ]
            - name: "node3"
              dns: [ "ip-10-0-3-200.us-east-2.compute.internal" ]
              ip: [ "10.0.3.200" ]

    - name: Generate http cert
      when: inventory_hostname == 'node1'
      command: |
        /usr/share/elasticsearch/bin/elasticsearch-certutil http --silent --in /tmp/instances.yml --out /tmp/es-certs.zip --self-signed --pass ""
      args:
        creates: /tmp/es-certs.zip

