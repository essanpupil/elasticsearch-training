---
# Play 1: Generate the token on the active Elasticsearch node
- name: Generate Kibana enrollment token
  hosts: node1  # Replace with your Elasticsearch initial/master node
  become: true
  tasks:
    - name: Generate enrollment token for Kibana
      ansible.builtin.command: /usr/share/elasticsearch/bin/elasticsearch-create-enrollment-token -s kibana
      register: token_output
      changed_when: false  # Generating a token doesn't change system configuration

    - name: Store token as a fact for the Kibana play
      ansible.builtin.set_fact:
        kibana_enrollment_token: "{{ token_output.stdout | trim }}"

# Play 2: Install and configure Kibana on the target node
- name: Install and enroll Kibana
  hosts: webui  # Replace with your Kibana node inventory name
  become: true
  tasks:
    - name: Install Kibana package
      ansible.builtin.apt:
        name: kibana
        state: present
        update_cache: true

    # - name: Check if Kibana is already enrolled
    #   ansible.builtin.command: grep -q "elasticsearch.hosts" /etc/kibana/kibana.yml
    #   register: kibana_configured
    #   failed_when: false
    #   changed_when: false

    - name: Run Kibana setup with enrollment token
      ansible.builtin.command: >
        /usr/share/kibana/bin/kibana-setup 
        --enrollment-token {{ hostvars['node1']['kibana_enrollment_token'] }}
      # when: kibana_configured.rc != 0

    # - name: Deploy Kibana configuration
    #   ansible.builtin.template:
    #     src: kibana.yml.j2
    #     dest: /etc/kibana/kibana.yml
    #     owner: root
    #     group: kibana
    #     mode: '0660'

    - name: Enable and start Kibana service
      ansible.builtin.systemd:
        name: kibana
        state: restarted
        enabled: true
