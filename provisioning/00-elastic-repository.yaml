---
- name: Install Elastic Stack from Official Repository
  hosts: all
  become: true
  vars:
    elastic_version: "9.x" # Or specify exact version like 8.13.0
    elastic_major_version: "9"

  tasks:
    - name: Import Elastic GPG Key
      ansible.builtin.rpm_key:
        state: present
        key: https://artifacts.elastic.co/GPG-KEY-elasticsearch

    - name: Add Elastic DNF Repository
      ansible.builtin.yum_repository:
        name: elasticsearch
        description: Elastic repository for {{ elastic_version }} packages
        baseurl: https://artifacts.elastic.co/packages/{{ elastic_version }}/yum
        gpgcheck: true
        gpgkey: https://artifacts.elastic.co/GPG-KEY-elasticsearch
        enabled: true

    - name: Update DNF cache
      ansible.builtin.dnf:
        update_cache: true
