---
- name: install elasticsearch logstash and kibana
  hosts: all
  gather_facts: true
  become: true
  vars:
    kibana_cert_dir: /etc/kibana/certs
  tasks:
    - name: Install Elasticsearch
      when: "'elasticsearch' in group_names"
      ansible.builtin.dnf:
        name: "elasticsearch"
        state: present
        enablerepo: elasticsearch

    - name: Deploy Elasticsearch configuration
      when: "'elasticsearch' in group_names"
      ansible.builtin.template:
        src: elasticsearch.yml
        dest: /etc/elasticsearch/elasticsearch.yml
        owner: root
        group: elasticsearch
        mode: '0660'

    - name: Enable and start Elasticsearch service
      when: "'elasticsearch' in group_names"
      ansible.builtin.systemd_service:
        name: elasticsearch
        state: restarted
        enabled: yes

    - name: Download http_ca.crt to the local Ansible controller
      when: inventory_hostname == 'node1'
      ansible.builtin.fetch:
        src: /etc/elasticsearch/certs/http_ca.crt
        dest: /tmp/fetched_certs/
        flat: true

    - name: Install Kibana
      when: "'kibana' in group_names"
      ansible.builtin.yum:
        name: kibana
        state: present

    - name: Create certs directory on Kibana host if missing
      when: "'kibana' in group_names"
      ansible.builtin.file:
        path: "{{ kibana_cert_dir }}"
        state: directory
        owner: kibana
        group: kibana
        mode: '0750'

    - name: Upload http_ca.crt from Ansible controller to Kibana host
      when: "'kibana' in group_names"
      ansible.builtin.copy:
        src: /tmp/fetched_certs/http_ca.crt
        dest: "{{ kibana_cert_dir }}/http_ca.crt"
        owner: kibana
        group: kibana
        mode: '0640'

    - name: Deploy Kibana configuration
      when: "'kibana' in group_names"
      ansible.builtin.template:
        src: kibana.yml
        dest: /etc/kibana/kibana.yml
        owner: root
        group: kibana
        mode: '0660'

    - name: Start and enable Kibana service
      when: "'kibana' in group_names"
      ansible.builtin.systemd_service:
        name: kibana
        state: restarted
        enabled: yes

    - name: Install Logstash and Beats on Kibana group hosts
      ansible.builtin.dnf:
        name:
          - logstash
          - filebeat
          - metricbeat
        state: absent
        update_cache: true
      when: "'kibana' in group_names"

