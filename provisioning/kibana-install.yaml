---
- name: install elasticsearch logstash and kibana
  hosts: kibana
  gather_facts: true
  become: true
  vars:
    kibana_cert_dir: /etc/kibana/certs
    shared_cluster_password: "SuperSecureClusterPassword2026!"
    es_home: "/usr/share/elasticsearch"
    es_config_dir: "/etc/elasticsearch"
    kibana_home: "/usr/share/kibana"
    kibana_config_dir: "/etc/kibana"
  tasks:
    - name: Install Kibana
      ansible.builtin.yum:
        name: kibana
        state: present

    - name: Create certs directory on Kibana host if missing
      ansible.builtin.file:
        path: "{{ kibana_cert_dir }}"
        state: directory
        owner: kibana
        group: kibana
        mode: '0750'

    - name: Upload http_ca.crt from Ansible controller to Kibana host
      ansible.builtin.copy:
        src: /tmp/fetched_certs/http_ca.crt
        dest: "{{ kibana_cert_dir }}/http_ca.crt"
        owner: kibana
        group: kibana
        mode: '0640'

    - name: Deploy Kibana configuration
      ansible.builtin.template:
        src: kibana.yml
        dest: /etc/kibana/kibana.yml
        owner: root
        group: kibana
        mode: '0660'

    - name: Create Kibana keystore file if missing
      ansible.builtin.command:
        cmd: "{{ kibana_home }}/bin/kibana-keystore create"
      args:
        creates: "{{ kibana_config_dir }}/kibana.keystore"

    - name: Check existing Kibana keys to prevent redundant tasks
      ansible.builtin.shell:
        cmd: "{{ kibana_home }}/bin/kibana-keystore list"
      register: kibana_keys_list
      changed_when: false

    - name: Add elasticsearch.password to Kibana keystore
      ansible.builtin.shell:
        cmd: "echo '{{ shared_cluster_password }}' | {{ kibana_home }}/bin/kibana-keystore add elasticsearch.password --stdin --force"
      when: "'elasticsearch.password' not in kibana_keys_list.stdout_lines"
      # no_log: true

    - name: Restrict Kibana keystore file permissions
      ansible.builtin.file:
        path: "{{ kibana_config_dir }}/kibana.keystore"
        owner: kibana
        group: kibana
        mode: '0660'

    - name: Start and enable Kibana service
      ansible.builtin.systemd_service:
        name: kibana
        state: restarted
        enabled: yes

    - name: Install Logstash and Beats on Kibana group hosts
      ansible.builtin.dnf:
        name:
          - logstash
          - filebeat
          - metricbeat
        state: absent
        update_cache: true
      when: "'kibana' in group_names"

    # - name: Restart logstash
